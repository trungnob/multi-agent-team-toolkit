# Multi-Agent Team Configuration
# Edit these values to match your setup.

# Tmux session and window (e.g., "1:0" means session 1, window 0)
# Fallback target when scripts run outside tmux (e.g. chatserver, cron).
# Inside tmux, scripts auto-detect the current session:window.
TMUX_TARGET="2:0"

# Pane assignments (indices within the tmux window above)
PANE_CLAUDE=0
PANE_GEMINI=1
PANE_CODEX=2

# Agent names (used in chatroom messages)
AGENT_CLAUDE="Claude"
AGENT_GEMINI="Gemini"
AGENT_CODEX="Codex"

# Scripting helpers
PANE_LIST="0 1 2"
AGENT_LIST="Claude Gemini Codex"
GEMINI_PANE=1

# Chatroom archive settings
ARCHIVE_KEEP_MINUTES=20
DAEMON_INTERVAL=300  # seconds between archive runs
